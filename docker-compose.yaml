services:
  postgres:
    image: postgis/postgis:16-3.4-alpine
    container_name: nestjs-server-postgres
    ports:
      - "${DATABASE_PORT:-5432}:5432"
    volumes:
      - nestjs-server-db:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ${DATABASE_USERNAME}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
      POSTGRES_DB: ${DATABASE_NAME}

  minio:
    image: minio/minio:RELEASE.2024-03-15T01-07-19Z
    container_name: nestjs-server-minio
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - nestjs-server-minio:/data
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    command: server --console-address ":9001" /data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  maildev:
    image: maildev/maildev
    container_name: nestjs-server-maildev
    ports:
      - "${MAIL_CLIENT_PORT:-1080}:1080"
      - "${MAIL_PORT:-1025}:1025"

  adminer:
    image: adminer
    container_name: nestjs-server-adminer
    restart: always
    ports:
      - "${ADMINER_PORT:-8080}:8080"

  redis:
    image: redis:alpine
    container_name: nestjs-server-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"

volumes:
  nestjs-server-db:
  nestjs-server-minio: